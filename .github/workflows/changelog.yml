---
name: Changelog

"on":
  pull_request:
    paths:
      - "crates/**"
      - "!crates/**/tests/**"

permissions:
  contents: read

jobs:
  check-changelog:
    name: Require an Unreleased changelog entry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check CHANGELOG.md was updated
        run: |
          if ! git diff --name-only \
              "origin/${{ github.base_ref }}...HEAD" | grep -qx CHANGELOG.md
          then
            echo "::error::This PR changes crate source but does not add" \
              "an entry under '## [Unreleased]' in CHANGELOG.md." \
              "See docs/versioning.md."
            exit 1
          fi
