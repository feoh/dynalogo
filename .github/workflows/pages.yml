---
name: GitHub Pages demo

# Temporarily disabled from automatic push/tag execution.
#
# Recent GitHub-hosted release-mode WASM builds fail during rust-lld linking for
# the macroquad browser binary, while the same command succeeds locally. Earlier
# failures reported missing browser host imports such as console_log,
# init_webgl, setup_canvas_size, canvas_width, canvas_height, dpi_scale, and
# run_animation_loop. Until the browser packaging/linker path is corrected, keep
# this workflow manual-only and no-op so normal pushes/releases do not emit
# repeated "GitHub Pages demo: Some jobs were not successful" notifications.
"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pages-disabled:
    name: Pages deployment disabled
    runs-on: ubuntu-latest
    steps:
      - name: Explain disabled Pages deployment
        run: |
          echo "GitHub Pages deployment is temporarily disabled."
          echo "Reason: GitHub-hosted release-mode WASM linking fails"
          echo "for the macroquad browser binary."
          echo "Re-enable this workflow after fixing the browser"
          echo "packaging/linker path."
