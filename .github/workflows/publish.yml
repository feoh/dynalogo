---
name: Publish crates

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-crates

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: crates-io
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      # dynalogo depends on dynalogo-core via a path dependency, so
      # dynalogo-core must land on crates.io first. cargo publish waits for
      # the crates.io index to catch up before the second publish, but a
      # short sleep avoids a race on a cold index.
      - name: Skip crates.io publish when token is absent
        if: ${{ env.CARGO_REGISTRY_TOKEN == '' }}
        run: |
          echo "::notice::CARGO_REGISTRY_TOKEN is not configured;"
          echo "skipping crates.io publication."

      - name: Publish dynalogo-core
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: cargo publish -p dynalogo-core

      - name: Wait for crates.io index
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: sleep 30

      - name: Publish dynalogo
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: cargo publish -p dynalogo
